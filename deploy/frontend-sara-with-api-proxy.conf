# Reemplazo sugerido para /etc/apache2/sites-available/frontend-sara.conf
# (hacer copia de seguridad antes): sudo cp .../frontend-sara.conf .../frontend-sara.conf.bak
#
# sudo cp deploy/frontend-sara-with-api-proxy.conf /etc/apache2/sites-available/frontend-sara.conf
# sudo a2enmod proxy proxy_http rewrite
# sudo apache2ctl configtest && sudo systemctl reload apache2
#
# La API Node debe estar activa: PORT=3001 y API_BASE_PATH=/ordenes-produccion
# URL: http://10.1.6.160/ordenes-produccion/api/ordenes-produccion

<VirtualHost *:80>
    ServerName 10.1.6.36
    ServerAlias 10.1.6.160

    DocumentRoot /var/www/html/frontend-sara/build

    # API órdenes → Node (evita que el SPA envíe todo a index.html). Requiere proxy + rewrite.
    ProxyRequests Off
    ProxyPreserveHost On
    RewriteEngine On
    RewriteRule ^/ordenes-produccion/(.*)$ http://127.0.0.1:3001/ordenes-produccion/$1 [P,L]
    ProxyPassReverse /ordenes-produccion/ http://127.0.0.1:3001/ordenes-produccion/

    <Directory "/var/www/html/frontend-sara/build">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # SPA React Router
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/frontend-sara-error.log
    CustomLog ${APACHE_LOG_DIR}/frontend-sara-access.log combined
</VirtualHost>
