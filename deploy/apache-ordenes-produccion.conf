# Incluir en Apache (puerto 80) para exponer la API sin :3001
# Activar: sudo a2enmod proxy proxy_http && sudo a2enconf sap-ordenes-produccion && sudo systemctl reload apache2
#
# Requiere que el proceso Node esté en marcha en 127.0.0.1:3001 (PORT en .env).

<IfModule mod_proxy.c>
  ProxyRequests Off
  ProxyPreserveHost On
  ProxyPass /ordenes-produccion/ http://127.0.0.1:3001/ordenes-produccion/
  ProxyPassReverse /ordenes-produccion/ http://127.0.0.1:3001/ordenes-produccion/
</IfModule>
